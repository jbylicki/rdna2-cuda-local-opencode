services:
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.cuda
      target: server
      args:
        # CUDA architectures to compile for (sm_89 = RTX 5060 Ti, sm_61 = GTX 1060)
        CUDA_ARCHS: "sm_89,sm_61"
    image: llama-cpp-cuda:latest
    ports:
      - "420:8080"
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    volumes:
      # Mount models directory — drop your .gguf files here
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
